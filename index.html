<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numismática Popper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Numismática Popper</h1>
      <p class="subtitle">Aumentando tu colección desde 2020</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="control-group">
        <label for="searchInput">Buscar</label>
        <input
          id="searchInput"
          type="text"
          placeholder="Buscar por título, país o año..."
        />
      </div>

      <div class="control-group">
        <label for="countryFilter">País</label>

        <div class="custom-select" data-target="countryFilter">
          <button type="button" class="custom-select-trigger">
            <span class="custom-select-value">Todos los países</span>
            <span class="custom-select-arrow">⌄</span>
          </button>
          <div class="custom-select-menu" id="countryFilterMenu"></div>
        </div>

        <select id="countryFilter" class="native-select-hidden">
          <option value="">Todos los países</option>
        </select>
      </div>

      <div class="control-group">
        <label for="metalFilter">Material</label>

        <div class="custom-select" data-target="metalFilter">
          <button type="button" class="custom-select-trigger">
            <span class="custom-select-value">Todos los materiales</span>
            <span class="custom-select-arrow">⌄</span>
          </button>
          <div class="custom-select-menu" id="metalFilterMenu"></div>
        </div>

        <select id="metalFilter" class="native-select-hidden">
          <option value="">Todos los materiales</option>
        </select>
      </div>

      <div class="control-group reset-wrap">
        <button id="resetFilters" class="reset-button" type="button">
          Limpiar filtros
        </button>
      </div>
    </section>

    <section class="results-bar reveal">
      <p id="resultsCount">Cargando monedas...</p>
    </section>

    <section id="coinsGrid" class="coins-grid"></section>
  </main>

  <template id="coinCardTemplate">
    <article class="coin-card reveal" tabindex="0" role="button">
      <div class="coin-image-wrap">
        <img class="coin-image" src="" alt="" />
      </div>

      <div class="coin-content">
        <div class="coin-top">
          <h2 class="coin-title"></h2>
        </div>

        <p class="coin-meta"></p>

        <div class="coin-badge-row"></div>

        <div class="coin-footer">
          <strong class="coin-price"></strong>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
