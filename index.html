<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numismática Popper</title>
  <meta property="og:title" content="Numismática Popper" />
  <meta property="og:description" content="Aumentando tu colección desde 2020" />
  <meta property="og:image" content="https://numismaticapopper.com/images/og-image.png" />
  <meta property="og:url" content="https://numismaticapopper.com/" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="images/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css?v=20260713b" />
</head>
<body data-view="landing">
  <script src="launch-lock.js"></script>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo-link">
        <svg class="np-monogram" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="np-gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#efd9a2"/>
              <stop offset="48%" stop-color="#cfac6b"/>
              <stop offset="100%" stop-color="#a8844a"/>
            </linearGradient>
          </defs>
          <circle cx="40" cy="40" r="37" fill="none" stroke="url(#np-gold)" stroke-width="1.2"/>
          <circle cx="40" cy="40" r="31" fill="none" stroke="url(#np-gold)" stroke-width="0.5" stroke-dasharray="2.5 3.5" opacity="0.6"/>
          <text x="40" y="48" text-anchor="middle" fill="url(#np-gold)" font-family="Cinzel, Georgia, serif" font-size="24" font-weight="600" letter-spacing="3">NP</text>
        </svg>
        <h1><span class="h1-numismatica">Numismática</span><span class="h1-popper">Popper</span></h1>
      </a>
      <p class="subtitle">Aumentando tu colección desde 2020</p>
    </div>
  </header>

  <div class="ticker-bar" aria-hidden="true">
    <div class="ticker-track">
      <span class="ticker-text">Publicaciones diarias en nuestro grupo de WhatsApp &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span class="ticker-text" aria-hidden="true">Publicaciones diarias en nuestro grupo de WhatsApp &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
    </div>
  </div>

  <!-- ─── Landing screen ──────────────────────────────────────────────────── -->
  <section id="landing" class="landing-screen">
    <div class="landing-inner">
      <h2 class="landing-heading">¿Qué estás buscando?</h2>
      <nav class="landing-nav" aria-label="Categorías principales">
        <button type="button" class="landing-btn landing-btn--all" data-landing-category="todas">Ver todas las monedas</button>
        <button type="button" class="landing-btn" data-landing-category="plata">Inversión</button>
        <button type="button" class="landing-btn" data-landing-category="argentina">Argentinas</button>
        <button type="button" class="landing-btn" data-landing-category="internacional">Mundiales</button>
        <button type="button" class="landing-btn landing-btn--economicas" data-landing-category="economicas">Económicas</button>
        <button type="button" class="landing-btn" data-landing-category="blisters">Blisters / Lotes</button>
        <button type="button" class="landing-btn" data-landing-category="medallas-libros">Medallas / Libros</button>
      </nav>
    </div>
  </section>

  <!-- ─── Catalog (hidden until landing button is clicked) ────────────────── -->
  <div id="catalog">
    <div class="category-bar">
      <nav class="category-nav container" aria-label="Categorías">
        <button type="button" class="cat-btn" data-category="plata">Inversión</button>
        <button type="button" class="cat-btn" data-category="argentina">Argentinas</button>
        <button type="button" class="cat-btn" data-category="internacional">Mundiales</button>
        <button type="button" class="cat-btn cat-btn--economicas" data-category="economicas">Económicas</button>
        <button type="button" class="cat-btn" data-category="blisters">Blisters / Lotes</button>
        <button type="button" class="cat-btn" data-category="medallas-libros">Medallas / Libros</button>
      </nav>

      <div class="sub-filter-bar" id="subFilterBar">
        <div class="sub-filter-list container" id="subFilterList" role="group" aria-label="Sub-filtros"></div>
      </div>
    </div>

    <div class="search-outer">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="17" y1="17" x2="22" y2="22"/>
        </svg>
        <input
          id="searchInput"
          type="text"
          placeholder="Buscar por título, país, año..."
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" id="clearSearch" class="search-clear" aria-label="Limpiar búsqueda">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <button type="button" id="resetFilters" class="reset-link">Limpiar filtros</button>
    </div>

    <main class="container">
      <section class="results-bar reveal">
        <p id="resultsCount">Cargando monedas...</p>
      </section>

      <section id="coinsGrid" class="coins-grid"></section>
    </main>
  </div>

  <template id="coinCardTemplate">
    <article class="coin-card reveal" tabindex="0" role="button">
      <div class="coin-image-wrap">
        <img class="coin-image" src="" alt="" width="400" height="400" decoding="async" />
      </div>

      <div class="coin-content">
        <div class="coin-top">
          <h2 class="coin-title"></h2>
          <span class="coin-year-tag"></span>
        </div>

        <p class="coin-meta"></p>

        <div class="coin-footer">
          <strong class="coin-price"></strong>
          <div class="coin-badge-row"></div>
        </div>
      </div>
    </article>
  </template>

  <script src="script.js?v=20260713b"></script>

  <footer class="site-footer" aria-label="Pie de página">
    <div class="footer-inner">
      <svg class="np-monogram np-monogram--small" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="np-gold-footer" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#efd9a2"/>
            <stop offset="48%" stop-color="#cfac6b"/>
            <stop offset="100%" stop-color="#a8844a"/>
          </linearGradient>
        </defs>
        <circle cx="40" cy="40" r="37" fill="none" stroke="url(#np-gold-footer)" stroke-width="1.2"/>
        <circle cx="40" cy="40" r="31" fill="none" stroke="url(#np-gold-footer)" stroke-width="0.5" stroke-dasharray="2.5 3.5" opacity="0.6"/>
        <text x="40" y="48" text-anchor="middle" fill="url(#np-gold-footer)" font-family="Cinzel, Georgia, serif" font-size="24" font-weight="600" letter-spacing="3">NP</text>
      </svg>
      <p class="footer-est">Est. MMXX</p>
      <p class="footer-tagline">Monedas de Colección e Inversión</p>
    </div>
  </footer>
</body>
</html>
